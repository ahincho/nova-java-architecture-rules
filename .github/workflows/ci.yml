name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}/.mvn-settings.xml

      - name: Configure Maven Settings (cross-repo reads)
        run: |
          cat > .mvn-settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>github</id>
                <username>ahincho</username>
                <password>${{ secrets.NOVA_RELEASE_PAT }}</password>
              </server>
              <server>
                <id>nova-packages-read-bom</id>
                <username>ahincho</username>
                <password>${{ secrets.NOVA_RELEASE_PAT }}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github</id>
                <activation><activeByDefault>true</activeByDefault></activation>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/ahincho/nova-java-architecture-rules</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>nova-packages-read-bom</id>
                    <url>https://maven.pkg.github.com/ahincho/nova-bom</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2/</url>
                    <releases><enabled>true</enabled></releases>
                  </repository>
                </repositories>
              </profile>
            </profiles>
          </settings>
          EOF

      - name: Build + Test
        run: mvn -B -s .mvn-settings.xml clean verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}